name: CRC End to End Test

on:
  push:
  workflow_dispatch:
    inputs:
      operator-version:
        description: "Operator version"
        required: false
        type: string
      operator-channel:
        description: "Operator channel"
        required: false
        type: string

permissions: read-all

jobs:
  crc-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set operator version and channel
        id: set-params
        run: |
          # Use input values if provided (workflow_dispatch), otherwise use defaults (push)
          OPERATOR_VERSION="${{ inputs.operator-version }}"
          OPERATOR_CHANNEL="${{ inputs.operator-channel }}"
          
          # Set defaults if empty (for push events)
          if [ -z "$OPERATOR_VERSION" ]; then
            OPERATOR_VERSION="1.3.0-dev-amd64"
          fi
          
          if [ -z "$OPERATOR_CHANNEL" ]; then
            OPERATOR_CHANNEL="fast-v1.3"
          fi
          
          echo "operator-version=${OPERATOR_VERSION}" >> $GITHUB_OUTPUT
          echo "operator-channel=${OPERATOR_CHANNEL}" >> $GITHUB_OUTPUT
          
          echo "Using operator version: ${OPERATOR_VERSION}"
          echo "Using operator channel: ${OPERATOR_CHANNEL}"

      - name: Remove unwanted stuff
        run: |
          # According to your needs
          #sudo rm -rf /usr/share/dotnet
          #sudo rm -rf /usr/local/lib/android

      - name: Set up CRC
        uses: crc-org/crc-github-action@v1
        with:
          preset: okd
          memory: 15200
          cpus: 16
          disk: 128

      - name: Setup admin context as default
        run: |
          oc auth can-i '*' '*' --all-namespaces
          oc get namespaces

      - name: Update global pull secret for ghcr.io
        env:
          GHCR_TOKEN: ${{ secrets.CRC_PULL_SECRET }}
          GHCR_USERNAME: USERNAME
          REGISTRY: ghcr.io/ibm-aiu
        run: |
          # Create temporary files
          GPS_FILE=$(mktemp)
          REG_AUTH_FILE=$(mktemp -u)
          NEW_GPS_FILE=$(mktemp)
          AUTH_VALUE_FILE=$(mktemp)
          
          # Get current global pull secret
          oc get secret/pull-secret -n openshift-config --template='{{index .data ".dockerconfigjson" | base64decode}}' > ${GPS_FILE}
          
          # Create registry auth
          oc registry login --registry="${REGISTRY}" --auth-basic="${GHCR_USERNAME}:${GHCR_TOKEN}" --to=${REG_AUTH_FILE}
          
          # Extract auth value
          cat ${REG_AUTH_FILE} | jq -r ".auths[\"${REGISTRY}\"].auth" > ${AUTH_VALUE_FILE}
          
          # Merge auth into global pull secret
          jq ".auths |= .+ {\"${REGISTRY}\":{\"auth\": \"$(cat ${AUTH_VALUE_FILE})\"}}" < ${GPS_FILE} > ${NEW_GPS_FILE}
          
          # Update global pull secret
          oc set data secret/pull-secret -n openshift-config --from-file=.dockerconfigjson=${NEW_GPS_FILE}
          
          # Clean up temporary files
          rm -f ${GPS_FILE} ${REG_AUTH_FILE} ${NEW_GPS_FILE} ${AUTH_VALUE_FILE}
          
          echo "Global pull secret updated successfully"

      - name: Create spyre-operator namespace and operator group
        run: |
          # Create namespace using oc new-project (OpenShift-specific)
          oc new-project spyre-operator

          # Create OperatorGroup
          cat <<EOF | oc apply -f -
          apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: spyre-operator-group
            namespace: spyre-operator
          EOF

      - name: Deploy catalog source
        run: |
          cat <<EOF | oc create -f -
          apiVersion: operators.coreos.com/v1alpha1
          kind: CatalogSource
          metadata:
            name: ibm-spyre-operators
            namespace: openshift-marketplace
          spec:
            displayName: IBM Spyre Operator
            publisher: IBM
            sourceType: grpc
            image: ghcr.io/ibm-aiu/spyre-operator-catalog:${{ steps.set-params.outputs.operator-version }}
            updateStrategy:
              registryPoll:
                interval: 10m
          EOF

      - name: Deploy operator
        run: |
          cat <<EOF | oc create -f -
          apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: spyre-operator
            namespace: spyre-operator
          spec:
            channel: ${{ steps.set-params.outputs.operator-channel }}
            name: spyre-operator
            source: ibm-spyre-operators
            sourceNamespace: openshift-marketplace
          EOF

      - name: Wait for CatalogSource to be ready
        run: |
          echo "Waiting for CatalogSource to be ready..."
          timeout 300 bash -c '
            until oc get catalogsource ibm-spyre-operators -n openshift-marketplace -o jsonpath="{.status.connectionState.lastObservedState}" | grep -q "READY"; do
              echo "=== CatalogSource Status ==="
              oc get catalogsource ibm-spyre-operators -n openshift-marketplace -o yaml | grep -A 5 "status:"
              echo ""
              echo "=== CatalogSource Pods ==="
              oc get pods -n openshift-marketplace -l olm.catalogSource=ibm-spyre-operators
              echo ""
              sleep 10
            done
          '
          echo "CatalogSource is ready"

      - name: Wait for operator installation
        run: |
          echo "Waiting for operator CSV to be created..."
          timeout 300 bash -c '
            until oc get csv -n spyre-operator 2>/dev/null | grep -q spyre-operator; do
              echo "=== Checking for CSV ==="
              oc get csv -n spyre-operator 2>/dev/null || echo "No CSVs found yet"
              echo ""
              echo "=== Subscription Status ==="
              oc get subscription spyre-operator -n spyre-operator -o yaml 2>/dev/null | grep -A 10 "status:" || echo "Subscription not ready"
              echo ""
              echo "=== Pods in spyre-operator namespace ==="
              oc get pods -n spyre-operator 2>/dev/null || echo "No pods yet"
              echo ""
              sleep 10
            done
          '
          
          echo "CSV found, waiting for operator to be ready..."
          CSV_NAME=$(oc get csv -n spyre-operator -o jsonpath='{.items[0].metadata.name}')
          echo "CSV Name: $CSV_NAME"
          
          timeout 300 bash -c "
            until oc get csv $CSV_NAME -n spyre-operator -o jsonpath='{.status.phase}' | grep -q 'Succeeded'; do
              echo '=== CSV Status ==='
              oc get csv $CSV_NAME -n spyre-operator -o jsonpath='{.status.phase}'
              echo ''
              echo '=== Operator Pods ==='
              oc get pods -n spyre-operator
              echo ''
              echo '=== Operator Deployments ==='
              oc get deployments -n spyre-operator
              echo ''
              echo '=== Pod Details (if any pods exist) ==='
              for pod in \$(oc get pods -n spyre-operator -o name 2>/dev/null); do
                echo \"--- Describing \$pod ---\"
                oc describe \$pod -n spyre-operator
                echo \"\"
              done
              echo ''
              sleep 10
            done
          "
          echo "Operator is ready"

      - name: Verify operator deployment
        run: |
          echo "=== Operator Deployment Status ==="
          echo ""
          echo "CatalogSource:"
          oc get catalogsource ibm-spyre-operators -n openshift-marketplace -o yaml
          echo ""
          echo "Subscription:"
          oc get subscription spyre-operator -n spyre-operator -o yaml
          echo ""
          echo "CSV:"
          oc get csv -n spyre-operator
          echo ""
          echo "Operator Pods:"
          oc get pods -n spyre-operator
          echo ""
          echo "Operator Deployment:"
          oc get deployment -n spyre-operator
