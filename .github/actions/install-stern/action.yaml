name: 'Install Stern'
description: 'Install stern CLI tool for Kubernetes log tailing'

inputs:
  version:
    description: 'Stern version to install'
    required: false
    default: '1.30.0'

runs:
  using: 'composite'
  steps:
    - name: Install stern
      shell: bash
      env:
        STERN_VERSION: ${{ inputs.version }}
      run: |
        #!/bin/bash -eu

        # Install stern for log capture
        if ! command -v stern &> /dev/null; then
          curl -L "https://github.com/stern/stern/releases/download/v${STERN_VERSION}/stern_${STERN_VERSION}_linux_amd64.tar.gz" -o stern.tar.gz
          tar -xzf stern.tar.gz
          sudo mv stern /usr/local/bin/
          sudo chmod +x /usr/local/bin/stern
          rm stern.tar.gz
        else
          echo "stern already installed"
        fi

        # Verify installation
        stern --version