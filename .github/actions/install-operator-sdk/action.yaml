name: 'Install Operator SDK'
description: 'Install operator-sdk CLI tool with GPG verification'

inputs:
  version:
    description: 'Operator SDK version to install'
    required: false
    default: 'v1.38.0'

runs:
  using: 'composite'
  steps:
    - name: Install operator-sdk
      shell: bash
      env:
        OPERATOR_SDK_VERSION: ${{ inputs.version }}
      run: |
        if ! command -v operator-sdk &> /dev/null; then
          #!/bin/bash -e
          export ARCH=$(case $(uname -m) in x86_64) echo -n amd64 ;; aarch64) echo -n arm64 ;; *) echo -n $(uname -m) ;; esac)
          export OS=$(uname | awk '{print tolower($0)}')
          export OPERATOR_SDK_DL_URL=https://github.com/operator-framework/operator-sdk/releases/download/${OPERATOR_SDK_VERSION}
          curl --retry 30 -sLO ${OPERATOR_SDK_DL_URL}/operator-sdk_${OS}_${ARCH}
          gpg --keyserver keyserver.ubuntu.com --recv-keys 052996E2A20B5C7E
          curl --retry 30 -sLO ${OPERATOR_SDK_DL_URL}/checksums.txt
          curl --retry 30 -sLO ${OPERATOR_SDK_DL_URL}/checksums.txt.asc
          gpg -u "Operator SDK (release) <cncf-operator-sdk@cncf.io>" --verify checksums.txt.asc
          grep operator-sdk_${OS}_${ARCH} checksums.txt | sha256sum -c -
          chmod +x operator-sdk_${OS}_${ARCH} && sudo mv operator-sdk_${OS}_${ARCH} /usr/local/bin/operator-sdk
        else
          echo "Operator SDK already installed"
        fi
        operator-sdk version