name: 'Capture Spyre Diagnostics'
description: 'Capture diagnostic information for Spyre components'

inputs:
  log-directory:
    description: 'Directory to store diagnostic files'
    required: false
    default: 'logs'
  namespace:
    description: 'Namespace where Spyre components are deployed'
    required: false
    default: 'spyre-operator'
  component:
    description: 'Component name to capture diagnostics for'
    required: false
    default: 'spyre-device-plugin'

runs:
  using: 'composite'
  steps:
    - name: Capture component diagnostics
      shell: bash
      env:
        LOG_DIRECTORY: ${{ inputs.log-directory }}
        NAMESPACE: ${{ inputs.namespace }}
        COMPONENT: ${{ inputs.component }}
      run: |
        #!/bin/bash -e

        oc get po -n "${NAMESPACE}"

        mkdir -p "${LOG_DIRECTORY}"

        echo "=== Capturing ${COMPONENT} pod describe output ===" | tee "${LOG_DIRECTORY}/${COMPONENT}-describe.log"

        # Get all component pods in namespace
        PODS=$(oc get pods -n "${NAMESPACE}" -l app="${COMPONENT}" -o name 2>/dev/null || echo "")

        if [ -z "$PODS" ]; then
          echo "No ${COMPONENT} pods found in ${NAMESPACE} namespace" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
        else
          for POD in $PODS; do
            echo "" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
            echo "=== Describe output for $POD ===" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
            oc describe $POD -n "${NAMESPACE}" >> "${LOG_DIRECTORY}/${COMPONENT}-describe.log" 2>&1 || echo "Failed to describe $POD" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
            echo "" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
          done
        fi

        # Also capture daemonset information
        echo "=== ${COMPONENT} DaemonSet describe ===" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
        oc describe daemonset -n "${NAMESPACE}" -l app="${COMPONENT}" >> "${LOG_DIRECTORY}/${COMPONENT}-describe.log" 2>&1 || echo "No ${COMPONENT} daemonset found" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"

        # Capture pod status
        echo "" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
        echo "=== ${COMPONENT} pod status ===" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
        oc get pods -n "${NAMESPACE}" -l app="${COMPONENT}" -o wide >> "${LOG_DIRECTORY}/${COMPONENT}-describe.log" 2>&1 || echo "Failed to get pod status" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"

        # Capture events related to component
        echo "" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
        echo "=== Recent events in ${NAMESPACE} namespace ===" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"
        oc get events -n "${NAMESPACE}" --sort-by='.lastTimestamp' | grep -i "${COMPONENT}" >> "${LOG_DIRECTORY}/${COMPONENT}-describe.log" 2>&1 || echo "No events found for ${COMPONENT}" | tee -a "${LOG_DIRECTORY}/${COMPONENT}-describe.log"